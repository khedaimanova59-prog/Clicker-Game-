<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кликер с перерождением 🔄</title>
    <style>
        /* Запрещаем зум при двойном тапе */
        body, button {
            touch-action: manipulation;
        }
        body {
            background: #0d0d1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }
        .left-panel {
            background: #1e1e3f;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 0 20px cyan;
            width: 280px;
            flex-shrink: 0;
        }
        .game-panel {
            text-align: center;
            background: #1a1a2e;
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 0 30px gold;
            flex-shrink: 0;
        }
        button {
            background: gold;
            border: none;
            font-size: 30px;
            padding: 20px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            touch-action: manipulation;
            width: 100%;
            max-width: 300px;
        }
        button:active {
            transform: scale(0.95);
        }
        .upgrade-btn, .auto-btn, .prestige-btn, .reset-btn {
            font-size: 18px;
            padding: 12px;
            width: 100%;
            margin-top: 15px;
            border-radius: 20px;
            max-width: none;
        }
        .upgrade-btn {
            background: limegreen;
        }
        .auto-btn {
            background: orange;
        }
        .prestige-btn {
            background: purple;
            color: white;
            border: 2px solid gold;
        }
        .reset-btn {
            background: crimson;
            color: white;
        }
        p {
            font-size: 22px;
            margin: 10px 0;
        }
        h1, h2 {
            margin-top: 0;
        }

        /* 📱 АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 700px) {
            body {
                flex-direction: column;
                gap: 20px;
                padding: 15px;
            }
            .left-panel, .game-panel {
                width: 100%;
                max-width: 400px;
                padding: 20px;
            }
            .game-panel {
                padding: 30px 20px;
            }
            button {
                font-size: 26px;
                padding: 15px 30px;
            }
            p {
                font-size: 20px;
            }
            h1 {
                font-size: 28px;
            }
        }

        /* 📟 ДЛЯ СОВСЕМ МАЛЕНЬКИХ ЭКРАНОВ */
        @media (max-width: 400px) {
            .left-panel, .game-panel {
                padding: 15px;
            }
            button {
                font-size: 22px;
                padding: 12px 20px;
            }
            p {
                font-size: 18px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- ЛЕВАЯ ПАНЕЛЬ -->
    <div class="left-panel">
        <h2>🔧 ПРОКАЧКА</h2>
        <p>💰 Баланс: <span id="balance">0</span></p>
        <p>⚡ Сила клика: <span id="clickPower">1</span></p>
        <p>🤖 Автокликеров: <span id="autoCount">0</span></p>
        <p>👑 Перерождений: <span id="prestigeCount">0</span></p>

        <button class="upgrade-btn" id="upgradeBtn">
            🔥 +1 к силе клика (50💰)
        </button>
        <button class="auto-btn" id="autoBtn">
            🤖 Купить автокликер (500💰)
        </button>
        <button class="prestige-btn" id="prestigeBtn">
            🔄 Перерождение (<span id="prestigeCost">500000</span>💰)
        </button>
        <button class="reset-btn" id="resetBtn">
            🗑️ Сбросить прогресс
        </button>
    </div>

    <!-- ИГРА -->
    <div class="game-panel">
        <h1>🖱️ КЛИКЕР</h1>
        <button id="clickBtn">КЛИК</button>
    </div>

    <script>
        // Данные
        let balance = 0;
        let clickPower = 1;
        let autoClickers = 0;
        let prestige = 0;

        // Элементы
        const balanceSpan = document.getElementById('balance');
        const powerSpan = document.getElementById('clickPower');
        const autoSpan = document.getElementById('autoCount');
        const prestigeSpan = document.getElementById('prestigeCount');
        const prestigeCostSpan = document.getElementById('prestigeCost');
        const clickBtn = document.getElementById('clickBtn');
        const upgradeBtn = document.getElementById('upgradeBtn');
        const autoBtn = document.getElementById('autoBtn');
        const prestigeBtn = document.getElementById('prestigeBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Сохранение
        function saveGame() {
            const gameData = { balance, clickPower, autoClickers, prestige };
            localStorage.setItem('clickerSave', JSON.stringify(gameData));
        }

        // Загрузка
        function loadGame() {
            const saved = localStorage.getItem('clickerSave');
            if (saved) {
                const data = JSON.parse(saved);
                balance = data.balance || 0;
                clickPower = data.clickPower || 1;
                autoClickers = data.autoClickers || 0;
                prestige = data.prestige || 0;
            }
            updateUI();
        }

        // Обновление интерфейса
        function updateUI() {
            balanceSpan.textContent = Math.floor(balance);
            powerSpan.textContent = clickPower;
            autoSpan.textContent = autoClickers;
            prestigeSpan.textContent = prestige;
            const cost = 500000 * (prestige + 1);
            prestigeCostSpan.textContent = cost;
        }

        // Клик
        clickBtn.addEventListener('click', () => {
            const multiplier = 1 + prestige;
            balance += clickPower * multiplier;
            updateUI();
            saveGame();
        });

        // Покупка силы клика
        upgradeBtn.addEventListener('click', () => {
            if (balance >= 50) {
                balance -= 50;
                clickPower++;
                updateUI();
                saveGame();
            } else {
                alert('❌ Мало монет!');
            }
        });

        // Покупка автокликера
        autoBtn.addEventListener('click', () => {
            if (balance >= 500) {
                balance -= 500;
                autoClickers++;
                updateUI();
                saveGame();
            } else {
                alert('❌ Нужно 500 монет!');
            }
        });

        // ПЕРЕРОЖДЕНИЕ
        prestigeBtn.addEventListener('click', () => {
            const cost = 500000 * (prestige + 1);
            if (balance >= cost) {
                balance = 0;
                clickPower = 1;
                autoClickers = 0;
                prestige++;
                updateUI();
                saveGame();
                alert(`✨ Переродился! Теперь множитель ×${1 + prestige}`);
            } else {
                alert(`❌ Нужно ${cost} монет для перерождения!`);
            }
        });

        // Сброс
        resetBtn.addEventListener('click', () => {
            if (confirm('Сбросить ВСЁ, включая перерождения?')) {
                balance = 0;
                clickPower = 1;
                autoClickers = 0;
                prestige = 0;
                updateUI();
                saveGame();
            }
        });

        // Автокликер
        setInterval(() => {
            if (autoClickers > 0) {
                const multiplier = 1 + prestige;
                balance += autoClickers * clickPower * multiplier;
                updateUI();
                saveGame();
            }
        }, 1000);

        // Старт
        loadGame();
    </script>
</body>
</html>
